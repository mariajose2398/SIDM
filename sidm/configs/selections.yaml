    electrons:
      - "pT > 10 GeV"
      - "|eta| < 2.4"
      - "looseID"
      - "missing_hits == 1"
  postLj_obj_cuts:
    <<: *base_postLj_obj_cuts
  evt_cuts:
    - *evt_baseNoLj

base_ljObjCut_ljIso: &base_ljObjCut_ljIso
  obj_cuts:
    <<: *obj_baseNoLj
  postLj_obj_cuts:
    ljs:
