# Config to define all available selections
# Selections contain object- and event-level cuts
# Previously defined selections can be imported with '<<' or '*'
# Any nested collections created by "<<" or '*' operations will be flattened in sidm_processor.py


# Cuts to apply to objects that are clustered into lepton jets
ljsource_cuts: &ljsource_cuts
  obj_cuts: &obj_ljsource_cuts
    electrons: &electrons_ljsource_cuts
      - "pT > 10 GeV"
      - "|eta| < 2.4"
      - 'MVANonIsoWPL'
    muons: &muons_ljsource_cuts
      - "looseID"
      - "pT > 5 GeV"
      - "|eta| < 2.4"
    photons: &photons_ljsource_cuts
      - "pT > 20 GeV"
      - "|eta| < 2.5"
      - 'Custom Cutbased'
      - "pixelSeed"
      - 'Photon DR Veto 0p025'
    dsaMuons: &dsaMuons_ljsource_cuts
      - "pT > 10 GeV"
      - "|eta| < 2.4"
      - "displaced ID"
      - "all" # cross-cleaning

ljsource_cuts_barrel: &ljsource_cuts_barrel
  obj_cuts: &obj_ljsource_cuts_barrel
    electrons: &electrons_ljsource_cuts_barrel
      - "pT > 10 GeV"
      - "barrel"
      - 'MVANonIsoWPL'
    muons: &muons_ljsource_cuts_barrel
      - "looseID"
      - "pT > 5 GeV"
      - "barrel"
    photons: &photons_ljsource_cuts_barrel
      - "pT > 20 GeV"
      - "barrel"
      - 'Custom Cutbased'
      - "pixelSeed"
      - 'Photon DR Veto 0p025'
    dsaMuons: &dsaMuons_ljsource_cuts_barrel
      - "pT > 10 GeV"
      - "barrel"
      - "displaced ID"
      - "all" # cross-cleaning

ljsource_cuts_endcap: &ljsource_cuts_endcap
  obj_cuts: &obj_ljsource_cuts_endcap
    electrons: &electrons_ljsource_cuts_endcap
      - "pT > 10 GeV"
      - "endcap"
      - 'MVANonIsoWPL'
    muons: &muons_ljsource_cuts_endcap
      - "looseID"
      - "pT > 5 GeV"
      - "endcap"
    photons: &photons_ljsource_cuts_endcap
      - "pT > 20 GeV"
      - "endcap"
      - 'Custom Cutbased'
      - "pixelSeed"
      - 'Photon DR Veto 0p025'
    dsaMuons: &dsaMuons_ljsource_cuts_endcap
      - "pT > 10 GeV"
      - "endcap"
      - "displaced ID"
      - "all" # cross-cleaning

# require final-state gen e and mu
gen_level_cuts: &gen_level_cuts
  obj_cuts: &obj_gen_level_cuts
    genMus:
      - "status 1"
    genEs:
      - "status 1"

# require final-state gen e and mu
gen_leptons_final: &gen_leptons_final
  obj_cuts: &obj_gen_leptons_final
    genMus:
      - "status 1"
    genEs:
      - "status 1"
  evt_cuts:
    - "PV filter"

# require born gen e and mu
gen_leptons_born: &gen_leptons_born
  obj_cuts: &obj_gen_leptons_born
    genMus:
      - "status 23"
    genEs:
      - "status 23"
  evt_cuts:
    - "PV filter"

# apply trigger
trigger: &trigger
  evt_cuts:
    - "pass triggers"

# PV filter
pv_cuts: &pv_cuts
  evt_cuts: &evt_pv_cuts
    - "PV filter"

# apply trigger, gen cuts, and pv filter
baseNoLjNoLjsource: &baseNoLjNoLjsource
  obj_cuts: &obj_baseNoLjNoLjsource
    <<: *obj_gen_level_cuts
  evt_cuts: &evt_baseNoLjNoljsource
    - *trigger
    - *evt_pv_cuts

baseNoLjNoLjsource_two_trigger: &baseNoLjNoLjsource_two_trigger
  obj_cuts:
    <<: *obj_gen_level_cuts
  evt_cuts:
    - "pass two missing triggers"
    - *evt_pv_cuts

baseNoLjNoLjsource_4_trigger: &baseNoLjNoLjsource_4_trigger
  obj_cuts:
    <<: *obj_gen_level_cuts
  evt_cuts:
    - "pass four triggers"
    - *evt_pv_cuts

baseNoLjNoLjsource_noTrigger: &baseNoLjNoLjsource_noTrigger
  obj_cuts:
    <<: *obj_gen_level_cuts
  evt_cuts:
    - *evt_pv_cuts

# apply trigger, gen cuts, pv filter, and lj-source cuts
baseNoLj: &baseNoLj
  obj_cuts: &obj_baseNoLj
    <<: *obj_baseNoLjNoLjsource
    <<: *obj_ljsource_cuts
  evt_cuts: &evt_baseNoLj
    - *evt_baseNoLjNoljsource

baseNoLj_noTrigger: &baseNoLj_noTrigger
  obj_cuts:
    <<: *obj_baseNoLjNoLjsource
    <<: *obj_ljsource_cuts
  evt_cuts:
    - *evt_pv_cuts

baseNoLj_noTrigger_distinct_parent: &baseNoLj_noTrigger_distinct_parent
  obj_cuts:
    <<: *obj_ljsource_cuts
    genMus:
      - "fromGenA"
      - "status 1"
    genEs:
      - "fromGenA"
      - "status 1"
  evt_cuts:
    - *evt_pv_cuts

baseNoLj_egLj: &baseNoLj_egLj
  obj_cuts:
    <<: *obj_ljsource_cuts
    <<: *obj_gen_level_cuts
  postLj_obj_cuts:
    egm_ljs:
      - "egLj"
  evt_cuts:
    - *evt_baseNoLj

# add obj-level LJ cuts
base_ljObjCut: &base_ljObjCut
  obj_cuts:
    <<: *obj_baseNoLj
  postLj_obj_cuts: &base_postLj_obj_cuts
    ljs: &lj_base
      - "pT > 30 GeV"
      - "|eta| < 2.4"
      - "mu_charge == 0"
  evt_cuts:
    - *evt_baseNoLj

# add >=2 LJ requirement
base: &base
  obj_cuts: &obj_base
    <<: *obj_baseNoLj
  postLj_obj_cuts:
    <<: *base_postLj_obj_cuts
  evt_cuts: &evt_base
    - *evt_baseNoLj
    - ">=2 LJs"

4mu: &4mu
  <<: *base
  evt_cuts: &evt_4mu
    - *evt_base
    - "4mu"

2mu2e: &2mu2e
  <<: *base
  evt_cuts: &evt_2mu2e
    - *evt_base
    - "2mu2e"

#selection on base_ljObjCut
base_ljObjCut_pixelHits_as_ljSource: &base_ljObjCut_pixelHits_as_ljSource
  obj_cuts:
    <<: *obj_baseNoLj
    muons:
      - "looseID"
      - "pT > 5 GeV"
      - "|eta| < 2.4"
      - "trkNumPixelHits <= 2"
  postLj_obj_cuts:
    <<: *base_postLj_obj_cuts
    mu_ljs:
      - "mu_lj_iso < 0.1"
    egm_ljs:
      - "egm_lj_iso < 0.2"
  evt_cuts:
    - *evt_baseNoLj

base_ljObjCut_pixelHits_as_lj_cut: &base_ljObjCut_pixelHits_as_lj_cut
  obj_cuts:
    <<: *obj_baseNoLj
  postLj_obj_cuts:
    <<: *base_postLj_obj_cuts
    mu_ljs:
      - "mu_lj_iso < 0.1"
      - "pf_pixelhits <= 2"
    egm_ljs:
      - "egm_lj_iso < 0.2"
  evt_cuts:
    - *evt_baseNoLj

base_ljObjCut_0e_lostHits: &base_ljObjCut_0e_lostHits
  obj_cuts:
    <<: *obj_baseNoLj
    electrons:
      - "pT > 10 GeV"
      - "|eta| < 2.4"
      - "looseID"
      - "missing_hits == 0"
  postLj_obj_cuts:
    <<: *base_postLj_obj_cuts
  evt_cuts:
    - *evt_baseNoLj

base_ljObjCut_1e_lostHits: &base_ljObjCut_1e_lostHits
